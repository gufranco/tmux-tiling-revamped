layouts:
  - changed-files:
      - any-glob-to-any-file: 'src/lib/layouts/**'

operations:
  - changed-files:
      - any-glob-to-any-file: 'src/lib/operations/**'

features:
  - changed-files:
      - any-glob-to-any-file: 'src/lib/features/**'

tests:
  - changed-files:
      - any-glob-to-any-file: 'test/**'

ci:
  - changed-files:
      - any-glob-to-any-file: '.github/**'

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - 'README.md'
          - 'CHANGELOG.md'
          - 'CONTRIBUTING.md'
          - 'SECURITY.md'
          - 'CODE_OF_CONDUCT.md'
