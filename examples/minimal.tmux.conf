# tmux-tiling-revamped: minimal configuration
#
# Add to your ~/.tmux.conf after installing via TPM.

# Install the plugin
set -g @plugin 'gufranco/tmux-tiling-revamped'

# That's it. Default keybindings:
#   prefix + d   - Apply dwindle layout
#   prefix + D   - Apply spiral layout
#   prefix + v   - Apply main-vertical layout
#   prefix + V   - Apply main-horizontal layout
#   prefix + b   - Balance panes
#   prefix + B   - Equalize panes
#   prefix + m   - Promote focused pane to master
#   prefix + .   - Rotate layout 90 degrees
#   prefix + ,   - Flip layout horizontally
#   prefix + C-r - Circulate panes
#   prefix + C-d - Smart split (autotile)
#   prefix + o   - Cycle to next layout
#   prefix + +   - Grow master pane
#   prefix + -   - Shrink master pane
#   prefix + S   - Toggle synchronize panes
#   prefix + M   - Mark pane (prompts for name)
#   prefix + j   - Jump to marked pane
#   prefix + g   - Toggle scratchpad popup
