# tmux-tiling-revamped: power user configuration
#
# Full configuration with all options.

set -g @plugin 'gufranco/tmux-tiling-revamped'

# Auto-apply: reapply the current layout when panes are added/removed
set -g @tiling_revamped_auto_apply 1

# Default layout applied to new windows (empty = disabled)
# set -g @tiling_revamped_default_layout "dwindle"

# Default BSP orientation (bottom-right, vertical, corner)
set -g @tiling_revamped_default_orientation "brvc"

# Focus-resize: expand focused pane toward golden ratio on focus change
set -g @tiling_revamped_focus_resize 0
set -g @tiling_revamped_focus_ratio 62

# Master pane ratio for main-vertical and main-horizontal layouts
set -g @tiling_revamped_master_ratio 60

# Main-center ratio (percentage of window width for the center pane)
set -g @tiling_revamped_main_center_ratio 60

# Resize step for resize-master grow/shrink (percentage points)
set -g @tiling_revamped_resize_step 5

# Layout cycle order
set -g @tiling_revamped_cycle_layouts "dwindle spiral grid main-vertical main-horizontal main-center monocle deck"

# Scratchpad dimensions
set -g @tiling_revamped_scratch_width "80%"
set -g @tiling_revamped_scratch_height "75%"

# Enable debug logging (writes to ~/.tmux/tiling-logs/tiling.log)
set -g @tiling_revamped_enable_logging 0

# Alt keybinding mode: use Alt+<key> instead of prefix+<key>
# set -g @tiling_revamped_alt_keys 1

# Vim-aware navigation: seamless pane/vim-split movement via M-h/j/k/l
# set -g @tiling_revamped_navigator "on"

# Custom keybindings (prefix-based by default, all configurable)
set -g @tiling_revamped_key_dwindle         "d"
set -g @tiling_revamped_key_spiral          "D"
set -g @tiling_revamped_key_main_vertical   "v"
set -g @tiling_revamped_key_main_horizontal "V"
set -g @tiling_revamped_key_balance         "b"
set -g @tiling_revamped_key_equalize        "B"
set -g @tiling_revamped_key_promote         "m"
set -g @tiling_revamped_key_rotate          "."
set -g @tiling_revamped_key_flip            ","
set -g @tiling_revamped_key_circulate       "C-r"
set -g @tiling_revamped_key_autotile        "C-d"
set -g @tiling_revamped_key_cycle           "o"
set -g @tiling_revamped_key_master_grow     "+"
set -g @tiling_revamped_key_master_shrink   "-"
set -g @tiling_revamped_key_sync            "S"
set -g @tiling_revamped_key_mark            "M"
set -g @tiling_revamped_key_jump            "j"
set -g @tiling_revamped_key_scratchpad      "g"

# Directional swap (empty = disabled, set keys to enable)
# set -g @tiling_revamped_key_swap_up    "K"
# set -g @tiling_revamped_key_swap_down  "J"
# set -g @tiling_revamped_key_swap_left  "H"
# set -g @tiling_revamped_key_swap_right "L"
